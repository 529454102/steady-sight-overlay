<!doctype html>
<html class="overlay-html" lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>稳视 Overlay 层</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body class="overlay-body">
    <div class="overlay-stage live-overlay" id="liveOverlay">
      <div class="grid-layer"></div>
      <div class="edge-frame"></div>
      <div class="horizon-line"></div>
      <div class="stability-layer">
        <span class="guide-bar guide-left"></span>
        <span class="guide-bar guide-right"></span>
        <span class="guide-bar guide-top"></span>
        <span class="guide-bar guide-bottom"></span>
        <span class="guide-edge edge-top"></span>
        <span class="guide-edge edge-right"></span>
        <span class="guide-edge edge-bottom"></span>
        <span class="guide-edge edge-left"></span>
      </div>
      <div class="center-anchor">
        <span class="anchor-dot"></span>
        <span class="anchor-ring"></span>
        <span class="anchor-cross horizontal"></span>
        <span class="anchor-cross vertical"></span>
      </div>
      <div class="vignette-layer"></div>
    </div>
    <script type="module" src="./src/overlay.js"></script>
  </body>
</html>
